spring.application.name=cloudnative

## Perfil 'dev' por defecto
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${SERVER_PORT:8080}

# Configuración general de AWS/S3
cloud.aws.region.static=${AWS_REGION:us-east-1}
cloud.aws.stack.auto=false

# Bucket S3 usado para guardar resúmenes de inscripción
app.s3.bucket-name=${AWS_S3_BUCKET_NAME:}

# Seguridad con Azure AD B2C
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AZURE_B2C_ISSUER_URI:https://panchovillarzucloudnative.b2clogin.com/tfp/34d885aa-360d-4347-ba69-3990da36207a/b2c_1_app-cloudnative1/v2.0/}

# Audiencia esperada del token JWT emitido por Azure AD B2C
app.security.azure.audience=${AZURE_B2C_AUDIENCE:492357b9-3fb8-4759-a909-b97535afdaf1}