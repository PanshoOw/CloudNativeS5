name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Checkout del repositorio
      - name: Checkout repository
        uses: actions/checkout@v3

      # Paso 2: Autenticar en DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Paso 3: Construir la imagen de Docker
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest .

      # Paso 4: Hacer push de la imagen a DockerHub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest

     # Paso 5: Configurar credenciales de AWS para SSH, incluyendo AWS_SESSION_TOKEN
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1  # Cambia a tu región
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}  # Añadido aquí

      # Paso 5.5:
# Paso 5.5: Crear archivo SSH correctamente
        # Paso 5.5: Crear archivo SSH correctamente
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
      
              cat > ~/.ssh/id_rsa << 'KEY'
          ${{ secrets.EC2_SSH_KEY }}
          KEY
          
              chmod 600 ~/.ssh/id_rsa
              chmod 700 ~/.ssh
          
              ls -la ~/.ssh

          - name: Debug SSH key
          run: |
          echo "Permisos:"
          ls -l ~/.ssh/id_rsa
      
          echo "Primera línea:"
          head -1 ~/.ssh/id_rsa
      
          echo "Última línea:"
          tail -1 ~/.ssh/id_rsa
      
          ssh-keygen -l -f ~/.ssh/id_rsa

      # Paso 6: Conectarse a EC2 y desplegar
      - name: SSH commands to deploy
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'
      
          echo "Conectado"
      
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
          EOF
